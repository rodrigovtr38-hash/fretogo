<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes">

    <title>FRETOGO • Plataforma Inteligente de Fretes</title>
    <meta name="description" content="Ecossistema logístico realtime da FRETOGO." />

    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FRETOGO">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-startup-image" href="/icon-512.png">

    <link rel="icon" href="/favicon.ico" />
  </head>

  <body class="bg-[#020617] overscroll-none">
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('✅ ServiceWorker registrado com sucesso: ', registration.scope);
            })
            .catch(err => {
              console.log('❌ Falha ao registrar o ServiceWorker: ', err);
            });
        });
      }
    </script>
  </body>
</html>
